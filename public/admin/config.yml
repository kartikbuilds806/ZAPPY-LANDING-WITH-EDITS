backend:
  name: github
  repo: kartikbuilds806/ZAPPY-LANDING-WITH-EDITS
  branch: main
  base_url: https://zappy-landing-with-edits.vercel.app
  auth_endpoint: oauth

local_backend: true

media_folder: "public/images"
public_folder: "/images"

collections:
  - name: "landing"
    label: "Landing Page Content"
    folder: "src/content/landing"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Browser Title", name: "title", widget: "string", default: "Zappy Tradezzz Landing Page"}
      - {label: "Hero Name", name: "hero_name", widget: "string", default: "ZAPPY TRADEZZZ"}
      - {label: "Hero Subtitle", name: "hero_subtitle", widget: "string", default: "THE BINARY GOD"}
      - {label: "Trader Image", name: "trader_image", widget: "image"}
      - {label: "Identity Description", name: "description", widget: "text", default: "Accurate signals. Transparent analysis."}
      - {label: "Member Count", name: "member_count", widget: "string", default: "27K+"}
      - {label: "Accuracy Rate", name: "accuracy_rate", widget: "string", default: "95%"}
      - {label: "Live Zoom Proof Image", name: "proof_image", widget: "image"}
      - {label: "Objection Quote", name: "objection_quote", widget: "string"}
      - {label: "Objection Response", name: "objection_response", widget: "text"}
      - {label: "Telegram Link", name: "telegram_link", widget: "string"}
